[build]
  publish = "site"
  ignore = "git diff --quiet $CACHED_COMMIT_REF $COMMIT_REF -- site/"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "no-referrer-when-downgrade"
