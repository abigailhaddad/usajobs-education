# Pipeline configuration: models, prompts, and shared settings.
# Consumed by llm_batch.py; imported by classify.py, verify.py, extract_skills.py.

max_concurrent: 5
max_retries: 5

# ── Classify ──────────────────────────────────────────────────────────────
classify:
  model: openai/gpt-5.4-mini
  prompt_version: v4-drop-edu-required-higher
  system_prompt: |
    You are classifying federal job postings (2210 IT Specialist series) by the role education plays in qualifying for the position.

    You will receive two fields from a USAJobs posting:
    - "Education field": the dedicated education section of the posting
    - "Qualifications Summary": the qualifications/requirements section

    The actual requirements may appear in EITHER field, or both, or neither. Read both carefully.

    Classify into exactly one category (mutually exclusive):

    - education_required: A degree (bachelor's or higher) is explicitly required at ALL grade levels in the posting, with no experience-only alternative. The posting must make clear you cannot qualify without the degree.

    - education_substitutable: Education is NOT mandatory, but the posting explicitly offers education as ONE way to qualify — alongside experience — at one or more grade levels. A candidate with the right degree and no relevant experience CAN qualify because the posting allows education to substitute for experience. This includes postings where education works at some grades but not others (e.g., education substitutes at GS-9 but "no substitution of education" at GS-12 — education is still a path at GS-9, so this is education_substitutable). This is the shape of most 2210 postings that reference OPM Alternative A / the 2210 individual occupational requirement: "you may qualify with IT-related experience OR a 4-year degree in computer science, information science, information systems management, mathematics, statistics, operations research, or engineering."

    - no_education: Education is NOT a qualifying path at ANY grade. To qualify at every grade level in this posting, you MUST have experience — a degree alone will not get you in at any level. This includes:
      * Postings that explicitly say "no substitution of education for experience" or "education is not substitutable" at EVERY grade
      * Postings where only experience is listed as a way to qualify and education is not mentioned as an alternative at any grade
      * Postings where the Education field is empty, boilerplate (transcript instructions, accreditation info, overflow text from other sections), or mentions only high school / GED
      * Postings where education is mentioned only as "preferred" or "desired" — that is not offering education as a QUALIFYING path

    - not_a_posting: Not an actual job posting — a DHA public notice collecting resumes, a placeholder, or a notice that explicitly says it is not posted for applications.

    KEY DISTINCTIONS

    1. education_substitutable vs no_education — does the posting OFFER education as a qualifying path at ANY grade?
       - "Ph.D. or equivalent doctoral degree or 3 full years of graduate education to qualify by education alone" at a given grade → education_substitutable
       - "Undergraduate and Graduate Education. Major study--computer science, information science, information systems management..." listed in the Education field → education_substitutable
       - "Specialized experience: 1 year at the next lower grade... OR Education: bachelor's degree with a major in..." → education_substitutable
       - "In lieu of specialized experience, you may have..." / "SUBSTITUTION OF EDUCATION FOR SPECIALIZED EXPERIENCE" → education_substitutable
       - Education works at lower grades but "no substitution" at higher grades → education_substitutable (education IS a path at the lower grades)
       - "Education is not substitutable for specialized experience" at EVERY grade → no_education
       - "There is no substitution of education for experience" with no education path at any grade → no_education
       - Education field is empty or only contains boilerplate like transcript-submission instructions → no_education
       - Education field only mentions high school / GED → no_education
       - CRITICAL: "no substitution of education at GS-12" does NOT mean education is REQUIRED at GS-12. It means education DOES NOT HELP at GS-12 — you need experience. If other grades DO accept education, classify as education_substitutable. If NO grade accepts education, classify as no_education.
       - Boilerplate like "If you are using education to qualify for this position, College transcripts must be submitted" is NOT by itself evidence of substitutability — it's a standard transcript-submission directive. You need to see the degree presented as an ALTERNATIVE (OR / in lieu / substitute / "may qualify with") elsewhere in the text.

    2. education_substitutable vs education_required — is the degree MANDATORY?
       - "You may qualify with [experience] OR [degree]" → education_substitutable (either path works)
       - "You MUST have a bachelor's degree in computer science to qualify" → education_required (no experience path)
       - "Positive education requirement" is NOT automatically education_required. In 2210 context it often refers to the OPM standard that allows experience OR education. Look at whether the posting actually forecloses the experience path.

    3. HARD EDGE CASE — "degree is mandatory" with a separate experience section.

       Some postings list BOTH a mandatory degree in the Education field AND required specialized experience in the Qualifications Summary as SEPARATE sections. The question is whether these are ALTERNATIVES (you need one OR the other) or CUMULATIVE (you need BOTH).

       The test: look for explicit "OR" / "in lieu of" / "substitute" / "may qualify with" language linking the two. If that language is absent, the degree AND experience are both required → education_required.

       CUMULATIVE (both required) → education_required:
         Education field: "An undergraduate degree in computer science is mandatory. The degree must be in..."
         Qual summary:    "GENERAL EXPERIENCE: ... SPECIALIZED EXPERIENCE: You must have 1 year of experience at the next lower grade."
         (No OR / in lieu / substitute language anywhere. You need BOTH the degree and the experience. Degree is mandatory → education_required.)

       ALTERNATIVES (education substitutes for experience) → education_substitutable:
         "You may qualify with 1 year of specialized experience OR a bachelor's degree in..."
         "In lieu of specialized experience, you may have..."
         "SUBSTITUTION OF EDUCATION FOR SPECIALIZED EXPERIENCE: ..."

       When in doubt on this edge case: if the Education field says "mandatory" / "required" and you can't find OR/in-lieu/substitute language connecting it to the experience requirements, classify as education_required.

    EXAMPLES

    education_substitutable:
    "To qualify for this position at the GS-11 level you must possess one of the following: One year of specialized experience equivalent to the GS-09 level... OR Ph.D. or equivalent doctoral degree OR 3 full years of progressively higher level graduate education leading to such a degree."
    (Both experience AND a doctoral education path are offered. Neither is mandatory.)

    education_substitutable (education works at some grades but not others):
    "GS-9: You may qualify with 1 year of specialized experience OR a master's degree... GS-12: Education may not be substituted for specialized experience."
    (Education IS a path at GS-9, even though it's blocked at GS-12. Education works at at least one grade → education_substitutable.)

    no_education:
    "Education is not substitutable for specialized experience at the GS-12 grade level. You must have 1 year of specialized experience equivalent to the GS-11 grade level."
    (Experience is the only path at every grade — education cannot qualify you at any level.)

    education_required:
    "This position has a positive education requirement in addition to the specialized experience requirement. You must possess a bachelor's degree in computer science, engineering, information science, information systems management, mathematics, operations research, statistics, or technology management."
    (Degree is on top of experience, not as an alternative — the degree is mandatory.)

    education_required (mandatory-degree-plus-experience pattern):
    Education field: "An undergraduate degree from an accredited college/university is mandatory. The degree must be in Computer and Information Sciences and Support Services..."
    Qual summary:    "GENERAL EXPERIENCE: ... SPECIALIZED EXPERIENCE: Must have at least 12 months of Cyberspace program supervisory experiences..."
    (The education field says "mandatory"; the qual summary lists experience separately with no OR/in-lieu/substitute language linking them. Both are required. The "If you are using education to qualify" transcript directive is boilerplate and does not establish substitutability. → education_required.)

    IMPORTANT: Your key_quote must be copied EXACTLY from the input text — do not paraphrase or summarize. If the classification is based on the ABSENCE of information (e.g., empty education field), use '(no relevant text)'.

# ── Verify ────────────────────────────────────────────────────────────────
verify:
  model: openai/gpt-5.4
  prompt_version: v4-drop-edu-required-higher
  system_prompt: |
    You are reviewing a classification of a federal 2210 IT Specialist job posting's education requirements.

    A first-pass model classified this posting. Your job is to verify whether the classification is correct.

    The categories (mutually exclusive) are:

    - no_education: Education is NOT a qualifying path at any grade. You MUST have experience — a degree alone will not get you in at any level. Includes: postings that explicitly say "no substitution of education for experience" at every grade, postings where the Education field is empty or only has transcript/boilerplate text, postings where only experience is described as a way to qualify, postings that only mention a high school diploma.

    - education_substitutable: Education is NOT mandatory, but the posting explicitly offers education as ONE way to qualify — alongside experience — at one or more grade levels. Includes postings where education works at some grades but not others (education is still a path at those grades). This is the shape of most 2210 postings that reference OPM Alternative A.

    - education_required: A degree (bachelor's or higher) is required with no experience-only alternative. The posting makes clear you cannot qualify without the degree.

    - not_a_posting: Not a real job posting (DHA notice, resume collection, placeholder).

    CRITICAL DISTINCTIONS:

    1. no_education vs education_substitutable — does the posting offer education as a qualifying PATH at any grade?
       - "no substitution of education at GS-12" does NOT mean education is REQUIRED at GS-12 — it means education DOES NOT HELP there. If other grades accept education, classify as education_substitutable. If no grade accepts education, classify as no_education.
       - Boilerplate like "If you are using education to qualify..." is NOT by itself evidence of substitutability.

    2. education_substitutable vs education_required — is the degree MANDATORY?
       - "You may qualify with [experience] OR [degree]" → education_substitutable
       - "You MUST have a bachelor's degree..." with no experience-only path → education_required
       - "Positive education requirement" in 2210 context is ambiguous — often refers to OPM Alternative A which ALLOWS experience or education. Check whether the posting actually forecloses the experience path.

    3. HARD EDGE CASE — "degree is mandatory" with a separate experience section.
       Test: look for explicit "OR" / "in lieu of" / "substitute" / "may qualify with" language linking them.
       - CUMULATIVE (no OR/in-lieu/substitute language) → education_required.
       - ALTERNATIVES (has OR/in-lieu/substitute language) → education_substitutable.

    4. A degree is only "required" if the posting makes clear you CANNOT qualify without it.

    The first-pass classification was: {original_category}
    The first-pass reasoning was: {original_reasoning}

    Review the actual posting text below and determine if the classification is correct.

# ── Extract Skills ────────────────────────────────────────────────────────
extract_skills:
  model: openai/gpt-5.4-mini
  system_prompt: |
    You are extracting structured skills and experience requirements from federal 2210 IT Specialist job postings.

    You will receive the position title, education field, and qualifications summary. Extract:

    1. **specialization**: The IT sub-field. Look at the title parenthetical (e.g. "INFOSEC", "NETWORK", "CUSTSPT") or infer from duties. Use one of: INFOSEC, NETWORK, SYSADMIN, APPSW, CUSTSPT, DATAMGT, PLCYPLN, GENERAL, or a brief custom label if none fit.

    2. **technical_skills**: Explicitly named technologies, tools, platforms, protocols, or products. Only extract things that are specifically named — not generic descriptions like "network tools." Examples: "Splunk", "AWS GovCloud", "Cisco IOS", "ServiceNow", "Python".

    3. **skill_areas**: Broader skill domains (3-7 items). E.g. "network security monitoring", "incident response", "cloud infrastructure management".

    4. **by_grade**: Skills/experience broken out by grade level. Many postings define different specialized experience for GS-09 vs GS-11 vs GS-12. Extract the specific tasks/skills for each grade mentioned. If the posting doesn't distinguish, use grade="all".

    5. **certifications_mentioned**: Any certs explicitly named. Don't infer — only extract if the text says the cert name.

    6. **clearance_level**: The security clearance mentioned.

    IMPORTANT:
    - Extract what the posting ACTUALLY says, not what you think the job might need.
    - For specialized_experience items, be concise: "managing Active Directory" not "Experience in managing and maintaining Active Directory environments including user provisioning and group policy management."
    - Ignore the four OPM IT competencies boilerplate (Attention to Detail, Customer Service, Oral Communication, Problem Solving) — these appear on every 2210 posting and aren't useful.
    - Ignore generic statements like "must have 1 year of specialized experience at the next lower grade level" — extract WHAT the experience is in, not the time requirement.
